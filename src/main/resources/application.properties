spring.application.name=demo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev,secrets}
spring.thymeleaf.cache=false
server.port=${PORT:9090}

# --------------------------
# Multipart File Upload Configuration
# --------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.strict-servlet-compliance=false
server.tomcat.max-swallow-size=100MB
server.tomcat.max-parameter-count=10000
# Fix FileCountLimitExceededException - tăng giới hạn parts trong multipart request
server.tomcat.max-part-count=200
server.tomcat.max-http-form-post-size=200MB

# --------------------------
# Cau hinh Database MySQL
# --------------------------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/bookstore
spring.datasource.username=root
spring.datasource.password=

# --------------------------
# Cau hinh JPA va Hibernate
# --------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --------------------------
# Google OAuth2 Configuration
# --------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# --------------------------
# Error page
# --------------------------
spring.web.error.path=/error

# --------------------------
# Spring Security Logging
# --------------------------
# Tắt warning về AuthenticationProvider configuration
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
# Tắt warning về CGLIB proxy
logging.level.org.springframework.aop.framework.CglibAopProxy=ERROR

# --------------------------
# JWT Configuration
# --------------------------
# Secret key (Base64 encoded, minimum 256 bits for HS256)
jwt.secret=${JWT_SECRET:change-me-in-secrets}
# Access token expiration: 15 minutes (in milliseconds) - shorter for security
jwt.expiration=900000
# Refresh token expiration: 7 days (in milliseconds)
jwt.refresh-expiration=604800000

# --------------------------
# JWT Cookie Configuration
# --------------------------
jwt.cookie.name=MV_ACCESS_TOKEN
jwt.cookie.refresh-name=MV_REFRESH_TOKEN
jwt.cookie.secure=false
jwt.cookie.same-site=Strict
jwt.cookie.domain=

# --------------------------
# Google reCAPTCHA v2 Checkbox Configuration
# --------------------------
# Đăng ký tại: https://www.google.com/recaptcha/admin (chọn reCAPTCHA v2 → "I'm not a robot")
# Thêm domain: localhost (dev) + domain production
# 
# TEST KEYS (luôn pass, KHÔNG hiện thử thách):
#   site-key=6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
#   secret=6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe
#
# REAL KEYS (hiện thử thách hình ảnh khi cần):
google.recaptcha.enabled=true
google.recaptcha.site-key=${RECAPTCHA_SITE_KEY:}
google.recaptcha.secret=${RECAPTCHA_SECRET:}

# --------------------------
# RabbitMQ Configuration (Disabled by default)
# --------------------------
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# Disable RabbitMQ listener if server not available
spring.rabbitmq.listener.simple.auto-startup=false
rabbitmq.enabled=false

# --------------------------
# Password Reset Configuration
# --------------------------
password-reset.token.expiry-minutes=15
password-reset.rate-limit.max-requests=3

# --------------------------
# Email Configuration (Gmail SMTP)
# --------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --------------------------
# Security Headers Configuration
# --------------------------
security.headers.hsts.enabled=true
security.headers.hsts.max-age=31536000
security.headers.csp=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com https://cdn.jsdelivr.net https://code.jquery.com https://cdn.datatables.net; script-src-elem 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com https://cdn.jsdelivr.net https://code.jquery.com https://cdn.datatables.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://cdn.datatables.net; style-src-elem 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://cdn.datatables.net; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net data:; frame-src https://www.google.com https://www.google.com.vn; connect-src 'self' https: ws: wss:;

# --------------------------
# Application Configuration
# --------------------------
app.name=MiniVerse
app.version=1.0.0
app.environment=development
app.url=http://localhost:9090
app.admin-email=admin@miniverse.com
app.support-email=support@miniverse.com
app.timezone=Asia/Ho_Chi_Minh
app.locale=vi_VN
app.init-data=true

# Pagination
app.pagination.default-size=12
app.pagination.max-size=100

# --------------------------
# Google Gemini AI Configuration (FREE TIER)
# Lấy API key tại: https://aistudio.google.com/app/apikey
# Free: 15 RPM, 1,500 requests/day, 1M tokens context
# --------------------------
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-1.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.max-output-tokens=2048
gemini.temperature=0.7
gemini.top-p=0.95
gemini.top-k=40
gemini.timeout=30
gemini.enabled=true

# --------------------------
# File Storage Configuration
# --------------------------
file.storage.upload-dir=uploads
file.storage.book-cover-dir=uploads/books
file.storage.avatar-dir=uploads/avatars
file.storage.blog-dir=uploads/blog
file.storage.max-file-size=5242880
file.storage.image-quality=0.8
file.storage.use-cloud-storage=false

# --------------------------
# Cloudinary Configuration
# --------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.enabled=true
cloudinary.folder=miniverse

# --------------------------
# Library Configuration
# --------------------------
library.max-borrow-limit=5
library.borrow-duration-days=14
library.max-renewals=2
library.renewal-days=7
library.reminder-days-before-due=3
library.late-fee-per-day=5000
library.max-late-fee=100000
library.days-until-lost=30

# Library Card
library.card.validity-years=1
library.card.issuance-fee=50000
library.card.renewal-fee=30000
library.card.replacement-fee=50000

# --------------------------
# Payment Configuration
# --------------------------
payment.currency=VND
payment.order-expiration-minutes=30

# COD
payment.cod.enabled=true
payment.cod.max-amount=5000000

# VietQR (Bank Transfer)
payment.vietqr.bank-id=ACB
payment.vietqr.account-no=22653537
payment.vietqr.account-name=MINIVERSE SHOP
payment.vietqr.template=compact2

# --------------------------
# Actuator (Health check)
# --------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --------------------------
# Logging Configuration
# --------------------------
logging.level.root=INFO
logging.level.fit.hutech.BuiBaoHan=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO
logging.file.path=logs
