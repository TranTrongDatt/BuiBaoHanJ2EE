<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Blog - MiniVerse</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">
        <!-- Featured Posts Carousel -->
        <div th:if="${featuredPosts != null and !featuredPosts.isEmpty()}" class="mb-5">
            <div id="featuredCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner rounded-3 overflow-hidden">
                    <div th:each="post, stat : ${featuredPosts}" 
                         th:class="'carousel-item ' + (${stat.first} ? 'active' : '')">
                        <div class="position-relative" style="height: 400px;">
                            <img th:src="${post.thumbnail ?: '/images/blog-default.jpg'}" 
                                 class="d-block w-100 h-100" style="object-fit: cover;" alt="">
                            <div class="position-absolute bottom-0 start-0 end-0 p-4" 
                                 style="background: linear-gradient(transparent, rgba(0,0,0,0.8));">
                                <span class="badge bg-primary mb-2">Featured</span>
                                <h3 class="text-white mb-2">
                                    <a th:href="@{/blog/{slug}(slug=${post.slug})}" class="text-white text-decoration-none">
                                        <span th:text="${post.title}">Post Title</span>
                                    </a>
                                </h3>
                                <p class="text-white-50 mb-0" th:text="${post.excerpt}">Post excerpt...</p>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#featuredCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#featuredCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                </button>
            </div>
        </div>
        
        <div class="row">
            <!-- Main Content -->
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4>
                        <span th:if="${currentTag != null}">Tag: <span th:text="${currentTag}" class="text-primary"></span></span>
                        <span th:if="${search != null}">Search: "<span th:text="${search}"></span>"</span>
                        <span th:if="${currentTag == null and search == null}">Latest Posts</span>
                    </h4>
                    <a th:href="@{/blog/new}" class="btn btn-primary" sec:authorize="isAuthenticated()">
                        <i class="bi bi-pencil me-2"></i>Write Post
                    </a>
                </div>
                
                <!-- Search Bar -->
                <form th:action="@{/blog}" method="get" class="mb-4">
                    <div class="input-group">
                        <input type="text" name="search" class="form-control" placeholder="Search posts..." 
                               th:value="${search}">
                        <button class="btn btn-outline-primary" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
                
                <!-- Posts Grid -->
                <div th:if="${posts.isEmpty()}" class="text-center py-5 text-muted">
                    <i class="bi bi-journal-text display-1 mb-3"></i>
                    <h5>No posts found</h5>
                    <p>Be the first to share your thoughts!</p>
                </div>
                
                <div class="row" th:if="${!posts.isEmpty()}">
                    <div th:each="post : ${posts}" class="col-md-6 mb-4">
                        <div class="card h-100 shadow-sm hover-shadow">
                            <a th:href="@{/blog/{slug}(slug=${post.slug})}">
                                <img th:src="${post.thumbnail ?: '/images/blog-default.jpg'}" 
                                     class="card-img-top" alt="" style="height: 200px; object-fit: cover;">
                            </a>
                            <div class="card-body">
                                <div class="d-flex gap-2 mb-2">
                                    <span th:each="tag : ${post.tags}" th:if="${#lists.size(post.tags) <= 3}"
                                          class="badge bg-light text-primary" th:text="${tag}">Tag</span>
                                </div>
                                <h5 class="card-title">
                                    <a th:href="@{/blog/{slug}(slug=${post.slug})}" class="text-decoration-none text-dark">
                                        <span th:text="${post.title}">Post Title</span>
                                    </a>
                                </h5>
                                <p class="card-text text-muted small" th:text="${post.excerpt}">Post excerpt...</p>
                            </div>
                            <div class="card-footer bg-white border-top-0">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="d-flex align-items-center">
                                        <img th:src="${post.author.avatarUrl ?: '/images/default-avatar.png'}" 
                                             class="rounded-circle me-2" alt="" style="width: 30px; height: 30px;">
                                        <small>
                                            <a th:href="@{/blog/author/{username}(username=${post.author.username})}"
                                               class="text-decoration-none" th:text="${post.author.username}">Author</a>
                                        </small>
                                    </div>
                                    <small class="text-muted">
                                        <i class="bi bi-eye me-1"></i><span th:text="${post.viewCount}">0</span>
                                        <i class="bi bi-heart ms-2 me-1"></i><span th:text="${post.likeCount}">0</span>
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Pagination -->
                <nav th:if="${posts.totalPages > 1}" class="mt-4">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:class="${posts.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/blog(page=${posts.number - 1}, tag=${currentTag}, search=${search})}">Previous</a>
                        </li>
                        <li th:each="pageNum : ${#numbers.sequence(0, posts.totalPages - 1)}"
                            class="page-item" th:class="${pageNum == posts.number} ? 'active'">
                            <a class="page-link" th:href="@{/blog(page=${pageNum}, tag=${currentTag}, search=${search})}" 
                               th:text="${pageNum + 1}">1</a>
                        </li>
                        <li class="page-item" th:class="${posts.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/blog(page=${posts.number + 1}, tag=${currentTag}, search=${search})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
            
            <!-- Sidebar -->
            <div class="col-lg-4">
                <!-- Popular Posts -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-fire me-2"></i>Popular Posts</h6>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:each="post : ${popularPosts}" 
                           th:href="@{/blog/{slug}(slug=${post.slug})}"
                           class="list-group-item list-group-item-action d-flex gap-3 py-3">
                            <img th:src="${post.thumbnail ?: '/images/blog-default.jpg'}" 
                                 class="rounded" alt="" style="width: 60px; height: 60px; object-fit: cover;">
                            <div>
                                <h6 class="mb-1" th:text="${post.title}">Post Title</h6>
                                <small class="text-muted">
                                    <i class="bi bi-eye me-1"></i><span th:text="${post.viewCount}">0</span> views
                                </small>
                            </div>
                        </a>
                    </div>
                </div>
                
                <!-- Tags Cloud -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-tags me-2"></i>Tags</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex flex-wrap gap-2">
                            <a th:each="tag : ${tags}" 
                               th:href="@{/blog(tag=${tag})}"
                               th:class="'badge text-decoration-none ' + (${tag == currentTag} ? 'bg-primary' : 'bg-light text-dark')"
                               th:text="${tag}">Tag</a>
                        </div>
                    </div>
                </div>
                
                <!-- My Posts (if authenticated) -->
                <div class="card" sec:authorize="isAuthenticated()">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-journal-text me-2"></i>Quick Links</h6>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:href="@{/blog/my-posts}" class="list-group-item list-group-item-action">
                            <i class="bi bi-file-text me-2"></i>My Posts
                        </a>
                        <a th:href="@{/blog/new}" class="list-group-item list-group-item-action">
                            <i class="bi bi-plus-circle me-2"></i>Write New Post
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style layout:fragment="styles">
.hover-shadow:hover {
    transform: translateY(-5px);
    box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important;
    transition: all 0.3s ease;
}
.card {
    transition: all 0.3s ease;
}
</style>
</body>
</html>
