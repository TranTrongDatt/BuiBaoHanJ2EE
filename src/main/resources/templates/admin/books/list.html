<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{admin/layout :: head}"></head>
<body class="admin-body">
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleAdminSidebar()"></div>
        
        <!-- Main Content -->
        <div class="admin-main">
            <!-- Top Navbar -->
            <header th:replace="~{admin/layout :: topbar}"></header>
            
            <!-- Content Area -->
            <main class="admin-content">
                <!-- Alert Messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Page Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="mb-1">Quản lý Sản phẩm</h2>
                        <p class="text-muted mb-0">Quản lý tất cả sách trong hệ thống</p>
                    </div>
                    <a th:href="@{/admin/books/add}" class="btn btn-primary">
                        <i class="bi bi-plus-lg me-2"></i>Thêm sách
                    </a>
                </div>

                <!-- Filters -->
                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/admin/books}" method="get" class="row g-3">
                            <div class="col-md-4">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                                    <input type="text" name="search" class="form-control" 
                                           placeholder="Tìm kiếm sách..." th:value="${search}">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select name="categoryId" class="form-select">
                                    <option value="">-- Tất cả danh mục --</option>
                                    <option th:each="category : ${categories}" 
                                            th:value="${category.id}" 
                                            th:text="${category.name}"
                                            th:selected="${categoryId != null && category.id == categoryId}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select name="status" class="form-select">
                                    <option value="">-- Tất cả trạng thái --</option>
                                    <option value="AVAILABLE" th:selected="${status == 'AVAILABLE'}">Có sẵn</option>
                                    <option value="OUT_OF_STOCK" th:selected="${status == 'OUT_OF_STOCK'}">Hết hàng</option>
                                    <option value="DISCONTINUED" th:selected="${status == 'DISCONTINUED'}">Ngừng bán</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-outline-primary w-100">
                                    <i class="bi bi-funnel me-2"></i>Lọc
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Books Table -->
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover admin-datatable">
                                <thead>
                                    <tr>
                                        <th width="60">ID</th>
                                        <th width="80">Ảnh</th>
                                        <th>Tên sách</th>
                                        <th>Danh mục</th>
                                        <th>Giá</th>
                                        <th>Tồn kho</th>
                                        <th>Trạng thái</th>
                                        <th width="150">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="book : ${books.content}">
                                        <td th:text="${book.id}"></td>
                                        <td>
                                            <img th:if="${book.coverImage != null}" 
                                                 th:src="@{${book.coverImage}}"
                                                 alt="Book Cover"
                                                 class="rounded"
                                                 style="width: 50px; height: 70px; object-fit: cover;">
                                            <div th:unless="${book.coverImage != null}" 
                                                 class="bg-light rounded d-flex align-items-center justify-content-center"
                                                 style="width: 50px; height: 70px;">
                                                <i class="bi bi-book text-muted"></i>
                                            </div>
                                        </td>
                                        <td>
                                            <strong th:text="${book.title}"></strong>
                                            <div th:if="${book.author != null}" class="small text-muted">
                                                <span th:text="${book.author.name}"></span>
                                            </div>
                                            <span th:if="${book.isFeatured}" class="badge bg-warning text-dark">
                                                <i class="bi bi-star-fill"></i> Nổi bật
                                            </span>
                                        </td>
                                        <td>
                                            <span th:if="${book.category != null}" 
                                                  class="badge bg-info"
                                                  th:text="${book.category.name}"></span>
                                            <span th:unless="${book.category != null}" class="text-muted">--</span>
                                        </td>
                                        <td>
                                            <span th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                                            <div th:if="${book.originalPrice != null && book.originalPrice > book.price}" 
                                                 class="small text-muted text-decoration-line-through"
                                                 th:text="${#numbers.formatDecimal(book.originalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                                        </td>
                                        <td>
                                            <span th:class="${book.stockQuantity <= 5 ? 'text-danger' : ''}"
                                                  th:text="${book.stockQuantity}"></span>
                                            <div class="small text-muted" th:text="'TV: ' + ${book.libraryStock}"></div>
                                        </td>
                                        <td>
                                            <span th:if="${book.status != null}" th:switch="${book.status.name()}">
                                                <span th:case="'AVAILABLE'" class="badge bg-success">Có sẵn</span>
                                                <span th:case="'OUT_OF_STOCK'" class="badge bg-danger">Hết hàng</span>
                                                <span th:case="'DISCONTINUED'" class="badge bg-secondary">Ngừng bán</span>
                                                <span th:case="*" class="badge bg-secondary" th:text="${book.status}"></span>
                                            </span>
                                            <span th:if="${book.status == null}" class="badge bg-secondary">N/A</span>
                                        </td>
                                        <td>
                                            <div class="btn-group btn-group-sm">
                                                <a th:href="@{/admin/books/{id}(id=${book.id})}" 
                                                   class="btn btn-outline-info" title="Xem">
                                                    <i class="bi bi-eye"></i>
                                                </a>
                                                <a th:href="@{/admin/books/edit/{id}(id=${book.id})}" 
                                                   class="btn btn-outline-primary" title="Sửa">
                                                    <i class="bi bi-pencil"></i>
                                                </a>
                                                <button type="button" class="btn btn-outline-danger" 
                                                        title="Xóa"
                                                        onclick="confirmDelete(this)"
                                                        th:data-id="${book.id}"
                                                        th:data-name="${book.title}">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${books.content.empty}">
                                        <td colspan="8" class="text-center py-4">
                                            <i class="bi bi-inbox display-4 text-muted"></i>
                                            <p class="text-muted mt-2">Không có sách nào</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <nav th:if="${books.totalPages > 1}" class="mt-4">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${books.first ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{/admin/books(page=${books.number - 1}, search=${search}, categoryId=${categoryId}, status=${status})}">
                                        <i class="bi bi-chevron-left"></i>
                                    </a>
                                </li>
                                <li th:each="i : ${#numbers.sequence(0, books.totalPages - 1)}"
                                    class="page-item" th:classappend="${i == books.number ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/admin/books(page=${i}, search=${search}, categoryId=${categoryId}, status=${status})}" th:text="${i + 1}"></a>
                                </li>
                                <li class="page-item" th:classappend="${books.last ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{/admin/books(page=${books.number + 1}, search=${search}, categoryId=${categoryId}, status=${status})}">
                                        <i class="bi bi-chevron-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Bạn có chắc chắn muốn xóa sách <strong id="deleteBookName"></strong>?</p>
                    <p class="text-danger small">Hành động này không thể hoàn tác.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <form id="deleteForm" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-2"></i>Xóa
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        function toggleAdminSidebar() {
            document.getElementById('adminSidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function confirmDelete(button) {
            const id = button.dataset.id;
            const name = button.dataset.name;
            document.getElementById('deleteBookName').textContent = name;
            document.getElementById('deleteForm').action = '/admin/books/delete/' + id;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
    </script>
</body>
</html>
