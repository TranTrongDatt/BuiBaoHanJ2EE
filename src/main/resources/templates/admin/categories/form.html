<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{admin/layout :: head}"></head>
<body class="admin-body">
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleAdminSidebar()"></div>
        
        <!-- Main Content -->
        <div class="admin-main">
            <!-- Top Navbar -->
            <header th:replace="~{admin/layout :: topbar}"></header>
            
            <!-- Content Area -->
            <main class="admin-content">
                <!-- Page Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="mb-1" th:text="${category.id == null ? 'Thêm Danh mục' : 'Sửa Danh mục'}">Thêm Danh mục</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a th:href="@{/admin}">Dashboard</a></li>
                                <li class="breadcrumb-item"><a th:href="@{/admin/categories}">Danh mục</a></li>
                                <li class="breadcrumb-item active" th:text="${category.id == null ? 'Thêm mới' : 'Chỉnh sửa'}"></li>
                            </ol>
                        </nav>
                    </div>
                    <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Quay lại
                    </a>
                </div>

                <!-- Form Card -->
                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/admin/categories/save}" 
                              th:object="${category}" 
                              method="post"
                              enctype="multipart/form-data">
                            
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:field="*{createdAt}">
                            
                            <div class="row">
                                <div class="col-md-8">
                                    <!-- Name -->
                                    <div class="mb-3">
                                        <label for="name" class="form-label">
                                            Tên danh mục <span class="text-danger">*</span>
                                        </label>
                                        <input type="text" 
                                               class="form-control" 
                                               id="name" 
                                               th:field="*{name}"
                                               th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : ''}"
                                               placeholder="Nhập tên danh mục"
                                               required>
                                        <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback" th:errors="*{name}"></div>
                                    </div>

                                    <!-- Field (Lĩnh vực) -->
                                    <div class="mb-3">
                                        <label for="fieldId" class="form-label">Lĩnh vực</label>
                                        <select name="fieldId" id="fieldId" class="form-select">
                                            <option value="">-- Chọn lĩnh vực --</option>
                                            <option th:each="field : ${fields}" 
                                                    th:value="${field.id}" 
                                                    th:text="${field.name}"
                                                    th:selected="${category.field != null && field.id == category.field.id}"></option>
                                        </select>
                                        <div class="form-text">Lĩnh vực mà danh mục này thuộc về</div>
                                    </div>

                                    <!-- Description -->
                                    <div class="mb-3">
                                        <label for="description" class="form-label">Mô tả</label>
                                        <textarea class="form-control" 
                                                  id="description" 
                                                  th:field="*{description}"
                                                  rows="4"
                                                  placeholder="Nhập mô tả cho danh mục..."></textarea>
                                    </div>

                                    <!-- Slug -->
                                    <div class="mb-3">
                                        <label for="slug" class="form-label">Slug (URL-friendly)</label>
                                        <input type="text" 
                                               class="form-control" 
                                               id="slug" 
                                               th:field="*{slug}"
                                               placeholder="Để trống sẽ tự động tạo từ tên">
                                        <div class="form-text">URL slug sẽ được tự động tạo nếu để trống</div>
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <!-- Image Upload -->
                                    <div class="mb-3">
                                        <label class="form-label">Ảnh danh mục</label>
                                        <div class="border rounded p-3 text-center">
                                            <img th:if="${category.image != null}" 
                                                 th:src="@{${category.image}}"
                                                 alt="Category Image"
                                                 id="imagePreview"
                                                 class="img-fluid rounded mb-3"
                                                 style="max-height: 200px;">
                                            <div th:unless="${category.image != null}"
                                                 id="imagePlaceholder"
                                                 class="bg-light rounded d-flex align-items-center justify-content-center mb-3"
                                                 style="height: 150px;">
                                                <i class="bi bi-image display-4 text-muted"></i>
                                            </div>
                                            <input type="file" 
                                                   name="imageFile" 
                                                   id="imageFile"
                                                   class="form-control"
                                                   accept="image/*"
                                                   onchange="previewImage(this)">
                                        </div>
                                    </div>

                                    <!-- Display Order -->
                                    <div class="mb-3">
                                        <label for="displayOrder" class="form-label">Thứ tự hiển thị</label>
                                        <input type="number" 
                                               class="form-control" 
                                               id="displayOrder" 
                                               th:field="*{displayOrder}"
                                               min="0">
                                    </div>

                                    <!-- Active Status -->
                                    <div class="mb-3">
                                        <div class="form-check form-switch">
                                            <input type="checkbox" 
                                                   class="form-check-input" 
                                                   id="isActive"
                                                   th:field="*{isActive}">
                                            <label class="form-check-label" for="isActive">
                                                Hiển thị trên trang
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Submit Buttons -->
                            <div class="border-top pt-4 mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-2"></i>
                                    <span th:text="${category.id == null ? 'Thêm danh mục' : 'Cập nhật'}"></span>
                                </button>
                                <a th:href="@{/admin/categories}" class="btn btn-outline-secondary ms-2">
                                    <i class="bi bi-x-lg me-2"></i>Hủy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script th:src="@{/js/bootstrap.min.js}"></script>
    
    <script>
        function toggleAdminSidebar() {
            document.getElementById('adminSidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('imagePlaceholder');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (!preview) {
                        const img = document.createElement('img');
                        img.id = 'imagePreview';
                        img.className = 'img-fluid rounded mb-3';
                        img.style.maxHeight = '200px';
                        img.src = e.target.result;
                        if (placeholder) {
                            placeholder.replaceWith(img);
                        }
                    } else {
                        preview.src = e.target.result;
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Auto-generate slug from name
        document.getElementById('name').addEventListener('input', function() {
            const slugInput = document.getElementById('slug');
            if (!slugInput.value) {
                const slug = this.value
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/đ/g, 'd')
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/(^-|-$)/g, '');
                slugInput.placeholder = slug || 'Để trống sẽ tự động tạo từ tên';
            }
        });
    </script>
</body>
</html>
