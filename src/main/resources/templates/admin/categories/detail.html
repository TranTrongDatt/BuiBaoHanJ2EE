<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{admin/layout :: head}"></head>
<body class="admin-body">
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleAdminSidebar()"></div>
        
        <!-- Main Content -->
        <div class="admin-main">
            <!-- Top Navbar -->
            <header th:replace="~{admin/layout :: topbar}"></header>
            
            <!-- Content Area -->
            <main class="admin-content">
                <!-- Page Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="mb-1">Chi tiết Danh mục</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a th:href="@{/admin}">Dashboard</a></li>
                                <li class="breadcrumb-item"><a th:href="@{/admin/categories}">Danh mục</a></li>
                                <li class="breadcrumb-item active" th:text="${category.name}"></li>
                            </ol>
                        </nav>
                    </div>
                    <div>
                        <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}" class="btn btn-primary">
                            <i class="bi bi-pencil me-2"></i>Chỉnh sửa
                        </a>
                        <a th:href="@{/admin/categories}" class="btn btn-outline-secondary ms-2">
                            <i class="bi bi-arrow-left me-2"></i>Quay lại
                        </a>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <!-- Category Image -->
                        <div class="card mb-4">
                            <div class="card-body text-center">
                                <img th:if="${category.image != null}" 
                                     th:src="@{${category.image}}"
                                     alt="Category Image"
                                     class="img-fluid rounded mb-3"
                                     style="max-height: 250px;">
                                <div th:unless="${category.image != null}" 
                                     class="bg-light rounded d-flex align-items-center justify-content-center mx-auto mb-3"
                                     style="width: 200px; height: 200px;">
                                    <i class="bi bi-image display-1 text-muted"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Quick Stats -->
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">Thống kê</h6>
                            </div>
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-muted">Số sách:</span>
                                    <strong th:text="${category.books != null ? category.books.size() : 0}">0</strong>
                                </div>
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-muted">Trạng thái:</span>
                                    <span th:if="${category.isActive}" class="badge bg-success">Hoạt động</span>
                                    <span th:unless="${category.isActive}" class="badge bg-secondary">Ẩn</span>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <span class="text-muted">Thứ tự:</span>
                                    <strong th:text="${category.displayOrder}">0</strong>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <!-- Category Info -->
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">Thông tin danh mục</h6>
                            </div>
                            <div class="card-body">
                                <table class="table table-borderless">
                                    <tr>
                                        <td class="text-muted" style="width: 150px;">ID:</td>
                                        <td><strong th:text="${category.id}"></strong></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">Tên danh mục:</td>
                                        <td><strong th:text="${category.name}"></strong></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">Slug:</td>
                                        <td><code th:text="${category.slug}"></code></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">Lĩnh vực:</td>
                                        <td>
                                            <span th:if="${category.field != null}" 
                                                  class="badge bg-info"
                                                  th:text="${category.field.name}"></span>
                                            <span th:unless="${category.field != null}" class="text-muted">--</span>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">Mô tả:</td>
                                        <td th:text="${category.description ?: 'Chưa có mô tả'}"></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">Ngày tạo:</td>
                                        <td th:text="${#temporals.format(category.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                    </tr>
                                    <tr>
                                        <td class="text-muted">Cập nhật:</td>
                                        <td th:text="${#temporals.format(category.updatedAt, 'dd/MM/yyyy HH:mm')}"></td>
                                    </tr>
                                </table>
                            </div>
                        </div>

                        <!-- Books in this category -->
                        <div class="card mt-4" th:if="${category.books != null && !category.books.empty}">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0">Sách trong danh mục này</h6>
                                <span class="badge bg-primary" th:text="${category.books.size()}"></span>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-sm">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Tên sách</th>
                                                <th>Giá</th>
                                                <th>Tồn kho</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="book : ${category.books}">
                                                <td th:text="${book.id}"></td>
                                                <td th:text="${book.title}"></td>
                                                <td th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                                                <td th:text="${book.stockQuantity}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script th:src="@{/js/bootstrap.min.js}"></script>
    
    <script>
        function toggleAdminSidebar() {
            document.getElementById('adminSidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
    </script>
</body>
</html>
