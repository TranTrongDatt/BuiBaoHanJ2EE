<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{admin/layout :: head}"></head>
<body class="admin-body">
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside th:replace="~{admin/layout :: sidebar}"></aside>
        
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleAdminSidebar()"></div>
        
        <!-- Main Content -->
        <div class="admin-main">
            <!-- Top Navbar -->
            <header th:replace="~{admin/layout :: topbar}"></header>
            
            <!-- Content Area -->
            <main class="admin-content">
                <!-- Alert Messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Page Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="mb-1">Quản lý Danh mục</h2>
                        <p class="text-muted mb-0">Quản lý các thể loại sách trong hệ thống</p>
                    </div>
                    <a th:href="@{/admin/categories/add}" class="btn btn-primary">
                        <i class="bi bi-plus-lg me-2"></i>Thêm danh mục
                    </a>
                </div>

                <!-- Filters -->
                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/admin/categories}" method="get" class="row g-3">
                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                                    <input type="text" name="search" class="form-control" 
                                           placeholder="Tìm kiếm danh mục..." th:value="${search}">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <select name="fieldId" class="form-select">
                                    <option value="">-- Tất cả lĩnh vực --</option>
                                    <option th:each="field : ${fields}" 
                                            th:value="${field.id}" 
                                            th:text="${field.name}"
                                            th:selected="${fieldId != null && field.id == fieldId}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button type="submit" class="btn btn-outline-primary w-100">
                                    <i class="bi bi-funnel me-2"></i>Lọc
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Categories Table -->
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover admin-datatable">
                                <thead>
                                    <tr>
                                        <th width="60">ID</th>
                                        <th width="80">Ảnh</th>
                                        <th>Tên danh mục</th>
                                        <th>Lĩnh vực</th>
                                        <th>Slug</th>
                                        <th width="100">Trạng thái</th>
                                        <th width="150">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="category : ${categories.content}">
                                        <td th:text="${category.id}"></td>
                                        <td>
                                            <img th:if="${category.image != null}" 
                                                 th:src="@{${category.image}}"
                                                 alt="Category Image"
                                                 class="rounded"
                                                 style="width: 50px; height: 50px; object-fit: cover;">
                                            <div th:unless="${category.image != null}" 
                                                 class="bg-light rounded d-flex align-items-center justify-content-center"
                                                 style="width: 50px; height: 50px;">
                                                <i class="bi bi-image text-muted"></i>
                                            </div>
                                        </td>
                                        <td>
                                            <strong th:text="${category.name}"></strong>
                                            <div class="small text-muted" th:if="${category.description != null}"
                                                 th:text="${#strings.abbreviate(category.description, 50)}"></div>
                                        </td>
                                        <td>
                                            <span th:if="${category.field != null}" 
                                                  class="badge bg-info"
                                                  th:text="${category.field.name}"></span>
                                            <span th:unless="${category.field != null}" 
                                                  class="text-muted">--</span>
                                        </td>
                                        <td>
                                            <code th:text="${category.slug}"></code>
                                        </td>
                                        <td>
                                            <span th:if="${category.isActive}" class="badge bg-success">Hoạt động</span>
                                            <span th:unless="${category.isActive}" class="badge bg-secondary">Ẩn</span>
                                        </td>
                                        <td>
                                            <div class="btn-group btn-group-sm">
                                                <a th:href="@{/admin/categories/{id}(id=${category.id})}" 
                                                   class="btn btn-outline-info" title="Xem">
                                                    <i class="bi bi-eye"></i>
                                                </a>
                                                <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}" 
                                                   class="btn btn-outline-primary" title="Sửa">
                                                    <i class="bi bi-pencil"></i>
                                                </a>
                                                <button type="button" class="btn btn-outline-danger" 
                                                        title="Xóa"
                                                        onclick="confirmDelete(this)"
                                                        th:data-id="${category.id}"
                                                        th:data-name="${category.name}">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${categories.content.empty}">
                                        <td colspan="7" class="text-center py-4">
                                            <i class="bi bi-inbox display-4 text-muted"></i>
                                            <p class="text-muted mt-2">Không có danh mục nào</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <nav th:if="${categories.totalPages > 1}" class="mt-4">
                            <ul class="pagination justify-content-center">
                                <li class="page-item" th:classappend="${categories.first ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{/admin/categories(page=${categories.number - 1}, search=${search}, fieldId=${fieldId})}">
                                        <i class="bi bi-chevron-left"></i>
                                    </a>
                                </li>
                                <li th:each="i : ${#numbers.sequence(0, categories.totalPages - 1)}"
                                    class="page-item" th:classappend="${i == categories.number ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/admin/categories(page=${i}, search=${search}, fieldId=${fieldId})}" th:text="${i + 1}"></a>
                                </li>
                                <li class="page-item" th:classappend="${categories.last ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{/admin/categories(page=${categories.number + 1}, search=${search}, fieldId=${fieldId})}">
                                        <i class="bi bi-chevron-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Xác nhận xóa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Bạn có chắc chắn muốn xóa danh mục <strong id="deleteCategoryName"></strong>?</p>
                    <p class="text-danger small">Hành động này không thể hoàn tác.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <form id="deleteForm" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-2"></i>Xóa
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        function toggleAdminSidebar() {
            document.getElementById('adminSidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function confirmDelete(button) {
            const id = button.dataset.id;
            const name = button.dataset.name;
            document.getElementById('deleteCategoryName').textContent = name;
            document.getElementById('deleteForm').action = '/admin/categories/delete/' + id;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
    </script>
</body>
</html>
