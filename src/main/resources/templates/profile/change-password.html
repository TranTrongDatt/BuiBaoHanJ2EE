<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - MiniVerse</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>
    
    <div class="container main-content">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <i class="bi bi-person-circle display-1 mb-3"></i>
                        <h5 sec:authentication="name">Người dùng</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="/profile" class="list-group-item list-group-item-action">
                            <i class="bi bi-person me-2"></i>Thông tin cá nhân
                        </a>
                        <a href="/profile/orders" class="list-group-item list-group-item-action">
                            <i class="bi bi-box-seam me-2"></i>Đơn hàng của tôi
                        </a>
                        <a href="/profile/change-password" class="list-group-item list-group-item-action active">
                            <i class="bi bi-key me-2"></i>Đổi mật khẩu
                        </a>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="list-group-item list-group-item-action text-danger border-0 w-100 text-start">
                                <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-9">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-key me-2"></i>Đổi mật khẩu
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="row mb-3">
                                <label class="col-sm-4 col-form-label">Mật khẩu hiện tại</label>
                                <div class="col-sm-8">
                                    <input type="password" class="form-control" placeholder="Nhập mật khẩu hiện tại">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-4 col-form-label">Mật khẩu mới</label>
                                <div class="col-sm-8">
                                    <input type="password" class="form-control" placeholder="Nhập mật khẩu mới">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <label class="col-sm-4 col-form-label">Xác nhận mật khẩu mới</label>
                                <div class="col-sm-8">
                                    <input type="password" class="form-control" placeholder="Nhập lại mật khẩu mới">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-sm-8 offset-sm-4">
                                    <button type="submit" class="btn btn-dark">
                                        <i class="bi bi-check-lg me-1"></i>Đổi mật khẩu
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
