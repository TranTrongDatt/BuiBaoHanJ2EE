<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Thông báo - MiniVerse</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <th:block th:replace="~{layout :: link-css}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <th:block th:replace="~{layout :: custom-css}"></th:block>
    <style>
        .notification-page { max-width: 800px; margin: 0 auto; }
        .notif-card { 
            border-left: 4px solid transparent; 
            transition: all 0.2s ease; 
            margin-bottom: 8px;
            border-radius: 10px;
            background: #fff;
        }
        .notif-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .notif-card.unread { 
            border-left-color: #F4A6C1; 
            background: #FFF5F8; 
        }
        .notif-card.read { 
            border-left-color: #E8DDD4; 
            opacity: 0.8; 
        }
        .notif-icon { 
            width: 44px; height: 44px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .notif-icon.order { background: #E8F5E9; color: #2E7D32; }
        .notif-icon.borrow { background: #E3F2FD; color: #1565C0; }
        .notif-icon.return-icon { background: #FFF3E0; color: #E65100; }
        .notif-icon.overdue { background: #FFEBEE; color: #C62828; }
        .notif-icon.system { background: #F3E5F5; color: #6A1B9A; }
        .notif-icon.like { background: #FCE4EC; color: #C2185B; }
        .notif-icon.comment { background: #E0F7FA; color: #00838F; }
        .notif-icon.follow { background: #E8EAF6; color: #283593; }
        .notif-icon.fine { background: #FFF8E1; color: #F57F17; }
        .notif-icon.payment { background: #E0F2F1; color: #00695C; }
        .notif-icon.default { background: #ECEFF1; color: #546E7A; }
        .notif-time { font-size: 0.8rem; color: #999; }
        .notif-badge { 
            display: inline-block; 
            padding: 2px 10px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 600;
        }
        .notif-badge.unread { background: #F4A6C1; color: #fff; }
        .notif-badge.read { background: #E0E0E0; color: #666; }
        .empty-notif { text-align: center; padding: 80px 20px; color: #999; }
        .empty-notif i { font-size: 4rem; display: block; margin-bottom: 16px; color: #E0E0E0; }
        .notif-actions { gap: 8px; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100" style="background: var(--background, #FDFDFD);">
    <th:block th:replace="~{layout :: header}"></th:block>
    <div class="header-spacer"></div>

    <main class="flex-grow-1">
        <div class="container py-4">
            <div class="notification-page">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-1">
                            <i class="bi bi-bell-fill" style="color: #F4A6C1;"></i> Thông báo
                        </h2>
                        <p class="text-muted mb-0" th:if="${unreadCount > 0}">
                            Bạn có <strong th:text="${unreadCount}">0</strong> thông báo chưa đọc
                        </p>
                    </div>
                    <div class="d-flex notif-actions">
                        <form th:action="@{/profile/notifications/read-all}" method="post" 
                              th:if="${unreadCount > 0}" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-check-all me-1"></i>Đã đọc tất cả
                            </button>
                        </form>
                        <form th:action="@{/profile/notifications/delete-read}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-trash me-1"></i>Xóa đã đọc
                            </button>
                        </form>
                        <a th:href="@{/profile}" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-arrow-left me-1"></i>Hồ sơ
                        </a>
                    </div>
                </div>

                <!-- Success/Error messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Notifications List -->
                <div th:if="${notifications != null and notifications.totalElements > 0}">
                    <div th:each="notif : ${notifications.content}" 
                         class="notif-card p-3 d-flex align-items-start gap-3"
                         th:classappend="${notif.isRead() ? 'read' : 'unread'}">
                        
                        <!-- Icon based on type -->
                        <div class="notif-icon"
                             th:classappend="${notif.type != null ? notif.type.name().toLowerCase() : 'default'}">
                            <i th:class="'bi ' + ${notif.getIconOrDefault()}"></i>
                        </div>
                        
                        <!-- Content -->
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="mb-1 fw-bold" th:text="${notif.title}">Tiêu đề</h6>
                                    <p class="mb-1 text-muted" style="font-size: 0.9rem;" 
                                       th:text="${notif.content}">Nội dung thông báo</p>
                                </div>
                                <span class="notif-badge"
                                      th:classappend="${notif.isRead() ? 'read' : 'unread'}"
                                      th:text="${notif.isRead() ? 'Đã đọc' : 'Mới'}">Mới</span>
                            </div>
                            <div class="d-flex align-items-center gap-3 mt-1">
                                <span class="notif-time">
                                    <i class="bi bi-clock me-1"></i>
                                    <span th:text="${#temporals.format(notif.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</span>
                                </span>
                                <div class="d-flex gap-2" th:unless="${notif.isRead()}">
                                    <form th:action="@{'/profile/notifications/' + ${notif.id} + '/read'}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-link btn-sm p-0 text-muted" style="font-size: 0.8rem;">
                                            <i class="bi bi-check2"></i> Đánh dấu đã đọc
                                        </button>
                                    </form>
                                </div>
                                <a th:if="${notif.actionUrl != null}" th:href="${notif.actionUrl}" 
                                   class="btn btn-link btn-sm p-0" style="font-size: 0.8rem;">
                                    Xem chi tiết <i class="bi bi-chevron-right"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <nav th:if="${notifications.totalPages > 1}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${notifications.first ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/profile/notifications(page=${notifications.number - 1})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li th:each="i : ${#numbers.sequence(0, notifications.totalPages - 1)}" 
                                class="page-item" th:classappend="${i == notifications.number ? 'active' : ''}">
                                <a class="page-link" th:href="@{/profile/notifications(page=${i})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${notifications.last ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/profile/notifications(page=${notifications.number + 1})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>

                <!-- Empty State -->
                <div th:if="${notifications == null or notifications.totalElements == 0}" class="empty-notif">
                    <i class="bi bi-bell-slash"></i>
                    <h5>Chưa có thông báo nào</h5>
                    <p>Khi có đơn hàng, dịch vụ mượn/trả sách hoặc cập nhật mới, bạn sẽ nhận thông báo tại đây.</p>
                    <a href="/" class="btn btn-outline-primary mt-2">
                        <i class="bi bi-house me-1"></i>Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{layout :: footer}"></th:block>
    <th:block th:replace="~{fragments/chatbot :: chatbot}"></th:block>

    <script th:src="@{/js/jquery-3.7.0.min.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
            crossorigin="anonymous"></script>
    <script>
        // Toggle Sidebar
        function toggleSidebar() {
            document.getElementById('sidebarMenu').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('sidebarMenu').classList.remove('active');
                document.getElementById('sidebarOverlay').classList.remove('active');
            }
        });
    </script>
</body>
</html>
