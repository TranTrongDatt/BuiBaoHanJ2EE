<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Danh sách yêu thích - MiniVerse</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
    <style>
        .wishlist-page { max-width: 1100px; margin: 0 auto; }
        .wishlist-header {
            background: linear-gradient(135deg, #fff0f3 0%, #fce4ec 100%);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 28px;
        }
        .wishlist-header h2 {
            font-weight: 700;
            color: #333;
            margin: 0;
        }
        .wishlist-count {
            background: #e91e63;
            color: #fff;
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .wishlist-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.25s ease;
            overflow: hidden;
            background: #fff;
        }
        .wishlist-card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
            transform: translateY(-3px);
        }
        .wishlist-card .card-img-wrap {
            position: relative;
            overflow: hidden;
            background: #f8f4f0;
        }
        .wishlist-card .card-img-wrap img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .wishlist-card:hover .card-img-wrap img {
            transform: scale(1.04);
        }
        .wishlist-card .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.9);
            color: #e53935;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            z-index: 2;
        }
        .wishlist-card .remove-btn:hover {
            background: #e53935;
            color: #fff;
        }
        .wishlist-card .card-body {
            padding: 16px 18px 8px;
        }
        .wishlist-card .book-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.6em;
            text-decoration: none;
        }
        .wishlist-card .book-title:hover {
            color: #e91e63;
        }
        .wishlist-card .book-author {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 8px;
        }
        .wishlist-card .book-price {
            font-weight: 700;
            font-size: 1.05rem;
            color: #e91e63;
        }
        .wishlist-card .book-price-original {
            font-size: 0.82rem;
            color: #bbb;
            text-decoration: line-through;
            margin-left: 6px;
        }
        .wishlist-card .card-actions {
            padding: 8px 18px 16px;
            display: flex;
            gap: 8px;
        }
        .wishlist-card .btn-add-cart {
            flex: 1;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 0;
            background: #e91e63;
            border-color: #e91e63;
            color: #fff;
        }
        .wishlist-card .btn-add-cart:hover {
            background: #c2185b;
            border-color: #c2185b;
        }
        .wishlist-card .btn-view {
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 14px;
            border: 1.5px solid #e0e0e0;
            color: #555;
            background: #fff;
        }
        .wishlist-card .btn-view:hover {
            border-color: #e91e63;
            color: #e91e63;
        }
        .wishlist-empty {
            text-align: center;
            padding: 60px 20px;
        }
        .wishlist-empty i {
            font-size: 5rem;
            color: #f8bbd0;
        }
        .wishlist-empty h4 {
            color: #999;
            margin-top: 20px;
            font-weight: 600;
        }
        .wishlist-empty p {
            color: #bbb;
            margin-bottom: 24px;
        }
        .wishlist-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-clear-all {
            font-size: 0.85rem;
            color: #999;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 16px;
            background: #fff;
        }
        .btn-clear-all:hover {
            color: #e53935;
            border-color: #e53935;
        }
        /* toast notification */
        .wishlist-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            min-width: 280px;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>
    <div class="header-spacer"></div>

    <div class="container page-content py-4 wishlist-page">
        <!-- Header -->
        <div class="wishlist-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div class="d-flex align-items-center gap-3">
                <h2><i class="bi bi-heart-fill text-danger me-2"></i>Danh sách yêu thích</h2>
                <span class="wishlist-count" th:if="${wishlistCount != null and wishlistCount > 0}" th:text="${wishlistCount} + ' sản phẩm'">0 sản phẩm</span>
            </div>
            <a th:href="@{/books}" class="btn btn-outline-dark rounded-pill px-4">
                <i class="bi bi-book me-1"></i>Khám phá thêm sách
            </a>
        </div>

        <!-- Wishlist Content -->
        <div th:if="${wishlistItems != null and !wishlistItems.isEmpty()}">
            <!-- Toolbar -->
            <div class="wishlist-toolbar">
                <span class="text-muted" th:text="'Hiển thị ' + ${#lists.size(wishlistItems)} + ' sản phẩm yêu thích'"></span>
                <button type="button" class="btn btn-clear-all" onclick="clearAllWishlist()">
                    <i class="bi bi-trash3 me-1"></i>Xóa tất cả
                </button>
            </div>

            <div class="row g-3">
                <div class="col-6 col-md-4 col-lg-3" th:each="item : ${wishlistItems}">
                    <div class="wishlist-card card h-100" th:id="'wishlist-item-' + ${item.book.id}">
                        <div class="card-img-wrap">
                            <a th:href="${item.book.slug != null and !item.book.slug.isEmpty()} ? @{/books/{slug}(slug=${item.book.slug})} : @{/books/{id}(id=${item.book.id})}">
                                <img th:src="@{${item.book.coverImage != null and item.book.coverImage.startsWith('/') ? item.book.coverImage : (item.book.coverImage != null ? '/uploads/books/' + item.book.coverImage : '/images/banner/hero-books.png')}}" 
                                     th:alt="${item.book.title}"
                                     onerror="this.onerror=null; this.src='/images/banner/hero-books.png';">
                            </a>
                            <button type="button" class="remove-btn"
                                    th:data-book-id="${item.book.id}"
                                    onclick="removeFromWishlist(this)"
                                    title="Xóa khỏi yêu thích">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                        <div class="card-body">
                            <a th:href="${item.book.slug != null and !item.book.slug.isEmpty()} ? @{/books/{slug}(slug=${item.book.slug})} : @{/books/{id}(id=${item.book.id})}" class="book-title">
                                <span th:text="${item.book.title}">Tên sách</span>
                            </a>
                            <p class="book-author" th:text="${item.book.author != null ? item.book.author.name : 'Chưa rõ tác giả'}">Tác giả</p>
                            <div class="d-flex align-items-baseline">
                                <span class="book-price" th:text="${#numbers.formatDecimal(item.book.price, 0, 'COMMA', 0, 'NONE')} + '₫'">0₫</span>
                                <span class="book-price-original" 
                                      th:if="${item.book.originalPrice != null and item.book.originalPrice.compareTo(item.book.price) > 0}"
                                      th:text="${#numbers.formatDecimal(item.book.originalPrice, 0, 'COMMA', 0, 'NONE')} + '₫'"></span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button type="button" class="btn btn-add-cart"
                                    th:data-book-id="${item.book.id}"
                                    onclick="moveToCart(this)">
                                <i class="bi bi-cart-plus me-1"></i>Thêm vào giỏ
                            </button>
                            <a th:href="${item.book.slug != null and !item.book.slug.isEmpty()} ? @{/books/{slug}(slug=${item.book.slug})} : @{/books/{id}(id=${item.book.id})}" class="btn btn-view">
                                <i class="bi bi-eye"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${wishlistItems == null or wishlistItems.isEmpty()}" class="wishlist-empty">
            <i class="bi bi-heart"></i>
            <h4>Danh sách yêu thích trống</h4>
            <p>Hãy thêm sách yêu thích để xem lại sau nhé!</p>
            <a th:href="@{/books}" class="btn btn-add-cart px-4 py-2" style="display:inline-block; border-radius:10px; text-decoration:none; background:#e91e63; color:#fff; font-weight:600;">
                <i class="bi bi-book me-2"></i>Khám phá sách ngay
            </a>
        </div>
    </div>

    <!-- Toast container -->
    <div class="wishlist-toast" id="wishlistToast" style="display:none;">
        <div class="alert alert-success alert-dismissible fade show mb-0 shadow" role="alert" id="toastContent">
            <i class="bi bi-check-circle me-2"></i><span id="toastMessage"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <th:block th:replace="~{layout::footer}"></th:block>
    <th:block th:replace="~{layout::link-js}"></th:block>

    <script>
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

        function showToast(message, isError) {
            const toast = document.getElementById('wishlistToast');
            const content = document.getElementById('toastContent');
            const msg = document.getElementById('toastMessage');
            msg.textContent = message;
            content.className = 'alert alert-dismissible fade show mb-0 shadow ' + (isError ? 'alert-danger' : 'alert-success');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function removeFromWishlist(btn) {
            const bookId = btn.dataset.bookId;
            if (!confirm('Bạn có chắc muốn xóa sách này khỏi danh sách yêu thích?')) return;

            const headers = { 'Content-Type': 'application/json' };
            if (csrfHeader && csrfToken) headers[csrfHeader] = csrfToken;

            fetch('/api/wishlist/' + bookId, {
                method: 'DELETE',
                headers: headers
            })
            .then(response => {
                if (response.ok) {
                    const card = document.getElementById('wishlist-item-' + bookId);
                    if (card) {
                        card.closest('.col-6').style.transition = 'all 0.3s ease';
                        card.closest('.col-6').style.opacity = '0';
                        card.closest('.col-6').style.transform = 'scale(0.9)';
                        setTimeout(() => {
                            card.closest('.col-6').remove();
                            // Check if list is now empty
                            const remaining = document.querySelectorAll('.wishlist-card');
                            if (remaining.length === 0) location.reload();
                        }, 300);
                    }
                    showToast('Đã xóa khỏi danh sách yêu thích');
                } else {
                    showToast('Có lỗi xảy ra, vui lòng thử lại!', true);
                }
            })
            .catch(() => showToast('Có lỗi xảy ra!', true));
        }

        function moveToCart(btn) {
            const bookId = btn.dataset.bookId;
            const headers = { 'Content-Type': 'application/json' };
            if (csrfHeader && csrfToken) headers[csrfHeader] = csrfToken;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Đang thêm...';

            fetch('/api/wishlist/' + bookId + '/move-to-cart', {
                method: 'POST',
                headers: headers
            })
            .then(response => {
                if (response.ok) {
                    const card = document.getElementById('wishlist-item-' + bookId);
                    if (card) {
                        card.closest('.col-6').style.transition = 'all 0.3s ease';
                        card.closest('.col-6').style.opacity = '0';
                        setTimeout(() => {
                            card.closest('.col-6').remove();
                            const remaining = document.querySelectorAll('.wishlist-card');
                            if (remaining.length === 0) location.reload();
                        }, 300);
                    }
                    showToast('Đã chuyển vào giỏ hàng!');
                } else {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-cart-plus me-1"></i>Thêm vào giỏ';
                    showToast('Không thể thêm vào giỏ hàng!', true);
                }
            })
            .catch(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-cart-plus me-1"></i>Thêm vào giỏ';
                showToast('Có lỗi xảy ra!', true);
            });
        }

        function clearAllWishlist() {
            if (!confirm('Bạn có chắc muốn xóa toàn bộ danh sách yêu thích?')) return;

            const headers = { 'Content-Type': 'application/json' };
            if (csrfHeader && csrfToken) headers[csrfHeader] = csrfToken;

            fetch('/api/wishlist', {
                method: 'DELETE',
                headers: headers
            })
            .then(response => {
                if (response.ok) {
                    showToast('Đã xóa toàn bộ danh sách yêu thích');
                    setTimeout(() => location.reload(), 500);
                } else {
                    showToast('Có lỗi xảy ra!', true);
                }
            })
            .catch(() => showToast('Có lỗi xảy ra!', true));
        }
    </script>
</body>
</html>
