<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${pageTitle != null ? pageTitle + ' - MiniVerse Shipper' : 'MiniVerse Shipper'}">MiniVerse Shipper</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Shipper CSS -->
    <link rel="stylesheet" th:href="@{/css/shipper.css}">
</head>
<body class="shipper-body">
    <div class="shipper-wrapper">
        <!-- Sidebar -->
        <aside th:fragment="sidebar" class="shipper-sidebar" id="shipperSidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-brand">
                    <img th:src="@{/images/logo/logo.png}" alt="MiniVerse" class="sidebar-logo-img">
                    <span class="sidebar-brand-text">MiniVerse</span>
                    <span class="sidebar-brand-badge shipper-badge">Shipper</span>
                </a>
                <button class="sidebar-toggle d-lg-none" onclick="toggleShipperSidebar()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="sidebar-menu">
                    <li class="sidebar-item">
                        <a th:href="@{/shipper}" class="sidebar-link" 
                           th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
                            <i class="bi bi-speedometer2"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a th:href="@{/shipper/orders}" class="sidebar-link"
                           th:classappend="${currentPage == 'orders' ? 'active' : ''}">
                            <i class="bi bi-box-seam"></i>
                            <span>Đơn hàng</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a th:href="@{/shipper/orders/available}" class="sidebar-link"
                           th:classappend="${currentPage == 'available' ? 'active' : ''}">
                            <i class="bi bi-truck"></i>
                            <span>Đơn chờ nhận</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a th:href="@{/shipper/attendance}" class="sidebar-link"
                           th:classappend="${currentPage == 'attendance' ? 'active' : ''}">
                            <i class="bi bi-calendar-check"></i>
                            <span>Chấm công</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a th:href="@{/shipper/income}" class="sidebar-link"
                           th:classappend="${currentPage == 'income' ? 'active' : ''}">
                            <i class="bi bi-wallet2"></i>
                            <span>Thu nhập</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a th:href="@{/shipper/account}" class="sidebar-link"
                           th:classappend="${currentPage == 'account' ? 'active' : ''}">
                            <i class="bi bi-person-gear"></i>
                            <span>Tài khoản</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <!-- Status Toggle -->
            <div class="sidebar-status" th:if="${profile != null}">
                <div class="status-label">Trạng thái hoạt động</div>
                <div class="status-toggle">
                    <button type="button" class="btn status-btn" 
                            th:classappend="${profile.status.name() == 'ONLINE' ? 'btn-success active' : 'btn-outline-success'}"
                            onclick="updateStatus('ONLINE')">
                        <i class="bi bi-circle-fill"></i> Online
                    </button>
                    <button type="button" class="btn status-btn"
                            th:classappend="${profile.status.name() == 'OFFLINE' ? 'btn-secondary active' : 'btn-outline-secondary'}"
                            onclick="updateStatus('OFFLINE')">
                        <i class="bi bi-circle"></i> Offline
                    </button>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar">
                        <img th:if="${profile != null and profile.avatarUrl != null}" 
                             th:src="${profile.avatarUrl}" alt="Avatar">
                        <i th:unless="${profile != null and profile.avatarUrl != null}" 
                           class="bi bi-person-circle"></i>
                    </div>
                    <div class="sidebar-user-info">
                        <span class="sidebar-user-name" th:text="${profile != null ? profile.fullName : #authentication.name}">Shipper</span>
                        <span class="sidebar-user-role">Nhân viên giao hàng</span>
                    </div>
                </div>
                <a th:href="@{/}" class="sidebar-back-btn">
                    <i class="bi bi-arrow-left"></i>
                    <span>Về trang chủ</span>
                </a>
            </div>
        </aside>
        
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleShipperSidebar()"></div>
        
        <!-- Main Content -->
        <div class="shipper-main">
            <!-- Top Navbar -->
            <header th:fragment="topbar" class="shipper-topbar">
                <div class="topbar-left">
                    <button class="topbar-toggle d-lg-none" onclick="toggleShipperSidebar()">
                        <i class="bi bi-list"></i>
                    </button>
                    <h1 class="topbar-title" th:text="${pageTitle ?: 'Dashboard'}">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <!-- Rating Badge -->
                    <span class="shipper-rating" th:if="${profile != null}">
                        <i class="bi bi-star-fill text-warning"></i>
                        <span th:text="${#numbers.formatDecimal(profile.rating ?: 5.0, 1, 1)}">5.0</span>
                    </span>
                    
                    <!-- Status indicator -->
                    <span class="shipper-status-badge" th:if="${profile != null}"
                          th:classappend="${profile.status.name()}">
                        <i class="bi bi-circle-fill"></i>
                        <span th:text="${profile.status.displayName}">Online</span>
                    </span>
                    
                    <span class="topbar-welcome">
                        Xin chào, <strong th:text="${profile != null ? profile.fullName : #authentication.name}">Shipper</strong>
                    </span>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="topbar-logout-btn">
                            <i class="bi bi-box-arrow-right"></i>
                            <span class="d-none d-md-inline">Đăng xuất</span>
                        </button>
                    </form>
                </div>
            </header>
            
            <!-- Content Area -->
            <main class="shipper-content">
                <!-- Content will be placed here by child templates -->
            </main>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/shipper.js}"></script>
</body>
</html>
