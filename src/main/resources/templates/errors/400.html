<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Yêu cầu không hợp lệ | MiniVerse</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
    <style>
        .error-page {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #f59e0b;
            line-height: 1;
        }
        .error-icon {
            font-size: 6rem;
            color: #f59e0b;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>
    
    <div class="error-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle error-icon"></i>
                    </div>
                    <h1 class="error-code">400</h1>
                    <h2 class="mb-3">Yêu cầu không hợp lệ</h2>
                    <p class="text-muted mb-4">
                        Yêu cầu của bạn không thể được xử lý. Vui lòng kiểm tra lại thông tin 
                        và thử lại.
                    </p>
                    
                    <div th:if="${message}" class="alert alert-warning mb-4">
                        <i class="bi bi-info-circle me-2"></i>
                        <span th:text="${message}">Chi tiết lỗi</span>
                    </div>
                    
                    <div class="d-flex justify-content-center gap-3">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Quay lại
                        </a>
                        <a href="/" class="btn btn-primary">
                            <i class="bi bi-house me-2"></i>Trang chủ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
