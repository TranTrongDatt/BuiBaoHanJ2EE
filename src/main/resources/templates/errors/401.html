<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 - Chưa đăng nhập | MiniVerse</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
    <style>
        .error-page {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #6366f1;
            line-height: 1;
        }
        .error-icon {
            font-size: 6rem;
            color: #6366f1;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>
    
    <div class="error-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center">
                    <div class="mb-4">
                        <i class="bi bi-lock error-icon"></i>
                    </div>
                    <h1 class="error-code">401</h1>
                    <h2 class="mb-3">Vui lòng đăng nhập</h2>
                    <p class="text-muted mb-4">
                        Bạn cần đăng nhập để truy cập trang này. Nếu phiên đăng nhập 
                        của bạn đã hết hạn, vui lòng đăng nhập lại.
                    </p>
                    
                    <div class="d-flex justify-content-center gap-3">
                        <a th:href="@{/login}" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                        </a>
                        <a th:href="@{/register}" class="btn btn-outline-primary btn-lg">
                            <i class="bi bi-person-plus me-2"></i>Đăng ký
                        </a>
                    </div>
                    
                    <hr class="my-4">
                    
                    <p class="text-muted small">
                        Nếu bạn tin đây là lỗi, vui lòng 
                        <a href="mailto:support@miniverse.com">liên hệ hỗ trợ</a>.
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
