<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Từ chối truy cập | MiniVerse</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <th:block th:replace="~{layout::custom-css}"></th:block>
    <style>
        .error-page {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #ef4444;
            line-height: 1;
        }
        .error-icon {
            font-size: 6rem;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>
    
    <div class="error-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center">
                    <div class="mb-4">
                        <i class="bi bi-shield-x error-icon"></i>
                    </div>
                    <h1 class="error-code">403</h1>
                    <h2 class="mb-3">Từ chối truy cập</h2>
                    <p class="text-muted mb-4">
                        Bạn không có quyền truy cập trang này. Nếu bạn cần quyền truy cập, 
                        vui lòng liên hệ quản trị viên.
                    </p>
                    
                    <div class="d-flex justify-content-center gap-3">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Quay lại
                        </a>
                        <a href="/" class="btn btn-primary">
                            <i class="bi bi-house me-2"></i>Trang chủ
                        </a>
                    </div>
                    
                    <hr class="my-4">
                    
                    <p class="text-muted small">
                        Nếu bạn tin đây là lỗi, vui lòng 
                        <a href="mailto:support@miniverse.com">liên hệ hỗ trợ</a>.
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
