<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - MiniVerse</title>
    <th:block th:replace="~{layout::link-css}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .room-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .room-icon {
            font-size: 3rem;
            color: #333;
        }
        .online-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 15px;
            height: 15px;
            background: #28a745;
            border-radius: 50%;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{layout::header}"></th:block>

    <div class="container main-content py-4">
        <div class="chat-container">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-chat-dots me-2"></i>Chat Room</h2>
                <div>
                    <span class="badge bg-success me-2" sec:authorize="isAuthenticated()">
                        <i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i>
                        Đang online: <span sec:authentication="name">User</span>
                    </span>
                </div>
            </div>

            <!-- Chưa đăng nhập -->
            <div sec:authorize="!isAuthenticated()" class="alert alert-warning">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Vui lòng <a href="/login" class="alert-link">đăng nhập</a> để sử dụng tính năng chat.
            </div>

            <!-- Đã đăng nhập -->
            <div sec:authorize="isAuthenticated()">
                <!-- Tạo phòng mới -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-plus-circle me-2"></i>Tham gia phòng chat</h5>
                        <form id="joinRoomForm" class="row g-3">
                            <div class="col-md-8">
                                <input type="text" class="form-control" id="roomIdInput" 
                                       placeholder="Nhập tên phòng (VD: general, java-dev, support...)" required>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-dark w-100">
                                    <i class="bi bi-box-arrow-in-right me-1"></i>Tham gia
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Danh sách phòng có sẵn -->
                <h5 class="mb-3"><i class="bi bi-collection me-2"></i>Phòng chat phổ biến</h5>
                <div class="row">
                    <!-- General Room -->
                    <div class="col-md-4 mb-3">
                        <div class="card room-card h-100" onclick="joinRoom('general')">
                            <div class="card-body text-center">
                                <i class="bi bi-globe room-icon"></i>
                                <h5 class="card-title mt-3">General</h5>
                                <p class="card-text text-muted">Phòng chat chung cho mọi người</p>
                                <span class="badge bg-secondary">Public</span>
                            </div>
                        </div>
                    </div>

                    <!-- Support Room -->
                    <div class="col-md-4 mb-3">
                        <div class="card room-card h-100" onclick="joinRoom('support')">
                            <div class="card-body text-center">
                                <i class="bi bi-headset room-icon"></i>
                                <h5 class="card-title mt-3">Hỗ trợ</h5>
                                <p class="card-text text-muted">Hỗ trợ khách hàng 24/7</p>
                                <span class="badge bg-primary">Support</span>
                            </div>
                        </div>
                    </div>

                    <!-- Book Lovers Room -->
                    <div class="col-md-4 mb-3">
                        <div class="card room-card h-100" onclick="joinRoom('book-lovers')">
                            <div class="card-body text-center">
                                <i class="bi bi-book room-icon"></i>
                                <h5 class="card-title mt-3">Book Lovers</h5>
                                <p class="card-text text-muted">Dành cho những người yêu sách</p>
                                <span class="badge bg-success">Community</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Private Chat -->
                <h5 class="mb-3 mt-4"><i class="bi bi-person-lines-fill me-2"></i>Chat riêng</h5>
                <div class="card">
                    <div class="card-body">
                        <form id="privateChatForm" class="row g-3">
                            <div class="col-md-8">
                                <input type="text" class="form-control" id="recipientInput" 
                                       placeholder="Nhập username người nhận..." required>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-outline-dark w-100">
                                    <i class="bi bi-chat-left-text me-1"></i>Bắt đầu chat
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{layout::footer}"></th:block>
    
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <script>
        // Join room
        function joinRoom(roomId) {
            window.location.href = '/chat/room/' + roomId;
        }

        // Form join room
        document.getElementById('joinRoomForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            const roomId = document.getElementById('roomIdInput').value.trim();
            if (roomId) {
                joinRoom(roomId);
            }
        });

        // Form private chat
        document.getElementById('privateChatForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            const recipient = document.getElementById('recipientInput').value.trim();
            if (recipient) {
                // Tạo room ID từ 2 username (sắp xếp alphabetically)
                const currentUser = /*[[${#authentication.name}]]*/ 'user';
                const users = [currentUser, recipient].sort();
                const roomId = 'private_' + users.join('_');
                joinRoom(roomId);
            }
        });
    </script>
</body>
</html>
