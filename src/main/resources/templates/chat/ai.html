<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>AI Chat Assistant - MiniVerse</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm" style="height: calc(100vh - 150px);">
                    <!-- Header -->
                    <div class="card-header bg-gradient text-white" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <div class="d-flex align-items-center">
                            <div class="position-relative me-3">
                                <i class="bi bi-robot display-6"></i>
                                <span class="position-absolute bottom-0 end-0 translate-middle-x badge rounded-pill bg-success">
                                    <span class="visually-hidden">Online</span>
                                </span>
                            </div>
                            <div>
                                <h5 class="mb-0">MiniVerse AI Assistant</h5>
                                <small class="opacity-75">Powered by AI - Always here to help</small>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Chat Messages -->
                    <div class="card-body overflow-auto" id="chatMessages" style="flex: 1;">
                        <!-- Welcome Message -->
                        <div th:if="${chatHistory == null or chatHistory.isEmpty()}" class="text-center py-5">
                            <i class="bi bi-chat-dots display-1 text-muted mb-3"></i>
                            <h4>Hello! I'm your AI Assistant</h4>
                            <p class="text-muted mb-4">I can help you with book recommendations, answer questions about our library, and more!</p>
                            
                            <!-- Quick Suggestions -->
                            <div class="d-flex flex-wrap justify-content-center gap-2">
                                <button th:each="suggestion : ${suggestions}" 
                                        class="btn btn-outline-primary btn-sm suggestion-btn"
                                        th:text="${suggestion}">Suggest me a book</button>
                            </div>
                        </div>
                        
                        <!-- Chat History -->
                        <div th:if="${chatHistory != null and !chatHistory.isEmpty()}">
                            <div th:each="message : ${chatHistory}" 
                                 th:class="'d-flex mb-3 ' + (${message.role == 'user'} ? 'justify-content-end' : 'justify-content-start')">
                                
                                <!-- AI Message -->
                                <div th:if="${message.role != 'user'}" class="d-flex gap-2" style="max-width: 80%;">
                                    <div class="flex-shrink-0">
                                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" 
                                             style="width: 36px; height: 36px;">
                                            <i class="bi bi-robot"></i>
                                        </div>
                                    </div>
                                    <div class="bg-light rounded-3 p-3" th:utext="${message.content}">AI Response</div>
                                </div>
                                
                                <!-- User Message -->
                                <div th:if="${message.role == 'user'}" 
                                     class="bg-primary text-white rounded-3 p-3" style="max-width: 80%;">
                                    <span th:text="${message.content}">User message</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Typing Indicator -->
                        <div id="typingIndicator" class="d-flex gap-2 d-none">
                            <div class="flex-shrink-0">
                                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" 
                                     style="width: 36px; height: 36px;">
                                    <i class="bi bi-robot"></i>
                                </div>
                            </div>
                            <div class="bg-light rounded-3 p-3">
                                <div class="typing-dots">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Input Area -->
                    <div class="card-footer bg-white border-top">
                        <form id="chatForm" class="d-flex gap-2">
                            <input type="text" id="messageInput" class="form-control" 
                                   placeholder="Type your message..." autocomplete="off">
                            <button type="submit" class="btn btn-primary px-4" id="sendBtn">
                                <i class="bi bi-send-fill"></i>
                            </button>
                        </form>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <small class="text-muted">
                                <i class="bi bi-info-circle me-1"></i>AI may occasionally provide inaccurate information
                            </small>
                            <button class="btn btn-link btn-sm text-muted" id="clearChat">
                                <i class="bi bi-trash me-1"></i>Clear chat
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script layout:fragment="scripts">
document.addEventListener('DOMContentLoaded', function() {
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const chatMessages = document.getElementById('chatMessages');
    const typingIndicator = document.getElementById('typingIndicator');
    const sendBtn = document.getElementById('sendBtn');
    
    // Scroll to bottom
    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    scrollToBottom();
    
    // Add message to chat
    function addMessage(content, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `d-flex mb-3 ${isUser ? 'justify-content-end' : 'justify-content-start'}`;
        
        if (isUser) {
            msgDiv.innerHTML = `
                <div class="bg-primary text-white rounded-3 p-3" style="max-width: 80%;">
                    ${escapeHtml(content)}
                </div>
            `;
        } else {
            msgDiv.innerHTML = `
                <div class="d-flex gap-2" style="max-width: 80%;">
                    <div class="flex-shrink-0">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" 
                             style="width: 36px; height: 36px;">
                            <i class="bi bi-robot"></i>
                        </div>
                    </div>
                    <div class="bg-light rounded-3 p-3">${content}</div>
                </div>
            `;
        }
        
        chatMessages.insertBefore(msgDiv, typingIndicator);
        scrollToBottom();
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Send message
    chatForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const message = messageInput.value.trim();
        if (!message) return;
        
        // Clear input and show user message
        messageInput.value = '';
        addMessage(message, true);
        
        // Show typing indicator
        typingIndicator.classList.remove('d-none');
        sendBtn.disabled = true;
        scrollToBottom();
        
        try {
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
            const headers = { 'Content-Type': 'application/json' };
            if (csrfToken) { headers[csrfHeader] = csrfToken; }
            
            const response = await fetch('/api/chat/ai', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            
            if (data.success) {
                addMessage(data.data.response, false);
                
                // Show book suggestions if any
                if (data.data.suggestions && data.data.suggestions.length > 0) {
                    let suggestionsHtml = '<div class="mt-2"><strong>Suggested Books:</strong><ul class="mb-0">';
                    data.data.suggestions.forEach(book => {
                        suggestionsHtml += `<li><a href="/book/${book.id}">${book.title}</a></li>`;
                    });
                    suggestionsHtml += '</ul></div>';
                    addMessage(suggestionsHtml, false);
                }
            } else {
                addMessage('Sorry, I encountered an error. Please try again.', false);
            }
        } catch (error) {
            console.error('Error:', error);
            addMessage('Sorry, something went wrong. Please try again.', false);
        } finally {
            typingIndicator.classList.add('d-none');
            sendBtn.disabled = false;
            messageInput.focus();
        }
    });
    
    // Suggestion buttons
    document.querySelectorAll('.suggestion-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            messageInput.value = this.textContent;
            chatForm.dispatchEvent(new Event('submit'));
        });
    });
    
    // Clear chat
    document.getElementById('clearChat').addEventListener('click', async function() {
        if (confirm('Clear all chat history?')) {
            const csrfTk = document.querySelector('meta[name="_csrf"]')?.content;
            const csrfHd = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';
            const delHeaders = {};
            if (csrfTk) { delHeaders[csrfHd] = csrfTk; }
            await fetch('/api/chat/ai/history', { method: 'DELETE', headers: delHeaders });
            location.reload();
        }
    });
});
</script>

<style layout:fragment="styles">
.typing-dots {
    display: flex;
    gap: 4px;
}
.typing-dots span {
    width: 8px;
    height: 8px;
    background: #6c757d;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
}
.typing-dots span:nth-child(1) { animation-delay: -0.32s; }
.typing-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}
</style>
</body>
</html>
