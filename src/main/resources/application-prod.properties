# ============================================================
# PRODUCTION PROFILE - Railway Deployment
# ============================================================
# Activated via: SPRING_PROFILES_ACTIVE=prod
# All secrets come from Railway environment variables

# --------------------------
# Server Configuration
# --------------------------
server.port=${PORT:9090}

# --------------------------
# Database (Railway MySQL addon)
# Railway provides: MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD, MYSQL_DATABASE
# MYSQL_URL format: mysql://user:pass@host:port/dbname
# We need JDBC format: jdbc:mysql://host:port/dbname
# --------------------------
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:bookstore}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --------------------------
# JPA / Hibernate (Production settings)
# --------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20

# --------------------------
# HikariCP Connection Pool
# --------------------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.initialization-fail-timeout=-1

# --------------------------
# Thymeleaf (Production - cache enabled)
# --------------------------
spring.thymeleaf.cache=true

# --------------------------
# Google OAuth2
# --------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# --------------------------
# JWT Configuration
# --------------------------
jwt.secret=${JWT_SECRET:}
jwt.expiration=900000
jwt.refresh-expiration=604800000
jwt.cookie.name=MV_ACCESS_TOKEN
jwt.cookie.refresh-name=MV_REFRESH_TOKEN
jwt.cookie.secure=true
jwt.cookie.same-site=Lax
jwt.cookie.domain=

# --------------------------
# Google reCAPTCHA
# --------------------------
google.recaptcha.enabled=true
google.recaptcha.site-key=${RECAPTCHA_SITE_KEY:}
google.recaptcha.secret=${RECAPTCHA_SECRET:}

# --------------------------
# RabbitMQ (Completely disabled on Railway)
# --------------------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
spring.rabbitmq.listener.simple.auto-startup=false
rabbitmq.enabled=false

# --------------------------
# Email Configuration (Gmail SMTP)
# --------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --------------------------
# Application Configuration
# --------------------------
app.name=MiniVerse
app.version=1.0.0
app.environment=production
app.url=${RAILWAY_PUBLIC_DOMAIN:https://miniverse.up.railway.app}
app.admin-email=admin@miniverse.com
app.support-email=support@miniverse.com
app.timezone=Asia/Ho_Chi_Minh
app.locale=vi_VN
app.init-data=false

# Pagination
app.pagination.default-size=12
app.pagination.max-size=100

# --------------------------
# Gemini AI Configuration
# --------------------------
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-1.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.max-output-tokens=2048
gemini.temperature=0.7
gemini.top-p=0.95
gemini.top-k=40
gemini.timeout=30
gemini.enabled=true

# --------------------------
# File Storage Configuration
# --------------------------
file.storage.upload-dir=uploads
file.storage.book-cover-dir=uploads/books
file.storage.avatar-dir=uploads/avatars
file.storage.blog-dir=uploads/blog
file.storage.max-file-size=5242880
file.storage.image-quality=0.8
file.storage.use-cloud-storage=true

# --------------------------
# Cloudinary Configuration (use cloud storage in production)
# --------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.enabled=true
cloudinary.folder=miniverse

# --------------------------
# Library Configuration
# --------------------------
library.max-borrow-limit=5
library.borrow-duration-days=14
library.max-renewals=2
library.renewal-days=7
library.reminder-days-before-due=3
library.late-fee-per-day=5000
library.max-late-fee=100000
library.days-until-lost=30
library.card.validity-years=1
library.card.issuance-fee=50000
library.card.renewal-fee=30000
library.card.replacement-fee=50000

# --------------------------
# Payment Configuration
# --------------------------
payment.currency=VND
payment.order-expiration-minutes=30
payment.cod.enabled=true
payment.cod.max-amount=5000000
payment.vietqr.bank-id=ACB
payment.vietqr.account-no=22653537
payment.vietqr.account-name=MINIVERSE SHOP
payment.vietqr.template=compact2

# --------------------------
# Password Reset
# --------------------------
password-reset.token.expiry-minutes=15
password-reset.rate-limit.max-requests=3

# --------------------------
# Security Headers
# --------------------------
security.headers.hsts.enabled=true
security.headers.hsts.max-age=31536000

# --------------------------
# Actuator (Health check for Railway)
# --------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=false
management.health.rabbit.enabled=false

# --------------------------
# Logging (Production - less verbose)
# --------------------------
logging.level.root=WARN
logging.level.fit.hutech.BuiBaoHan=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
logging.level.org.springframework.aop.framework.CglibAopProxy=ERROR

# --------------------------
# Multipart (same as dev)
# --------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
